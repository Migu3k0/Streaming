spring:
  application:
    name: ms-series
  datasource:
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_series?createDatabaseIfNotExist=true&serverTimezone=UTC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  profiles:
    active: dev

springdoc:
  profiles:
    active: dev
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

server:
  port: 8098

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    info:
      enabled: true